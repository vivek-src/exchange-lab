version: '3.8'

services:
  postgres:
    image: timescale/timescaledb:latest-pg17
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-exchange_lab}
    volumes:
      - xchg_data:/var/lib/postgresql/data
    networks:
      - xchg
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-exchange_lab}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: redis
    networks:
      - xchg
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: api
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-exchange_lab}?schema=public
      - REDIS_URL=redis://redis:6379
      - PORT=3001
    networks:
      - xchg
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  engine:
    build:
      context: .
      dockerfile: packages/engine/Dockerfile
    container_name: engine
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-exchange_lab}?schema=public
      - REDIS_URL=redis://redis:6379
    networks:
      - xchg
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ledger:
    build:
      context: .
      dockerfile: packages/db/Dockerfile
    container_name: ledger
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-exchange_lab}?schema=public
      - REDIS_URL=redis://redis:6379
    networks:
      - xchg
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ws:
    build:
      context: .
      dockerfile: packages/ws/Dockerfile
    container_name: ws
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-exchange_lab}?schema=public
      - REDIS_URL=redis://redis:6379
      - PORT=3002
    networks:
      - xchg
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    container_name: web
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-exchange_lab}?schema=public
      - PORT=3000
    networks:
      - xchg
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - xchg
    restart: unless-stopped
    depends_on:
      - api
      - web
      - ws

networks:
  xchg:
    name: xchg
    driver: bridge

volumes:
  xchg_data:
